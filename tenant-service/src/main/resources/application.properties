spring.application.name=tenant-service

spring.datasource.url=jdbc:postgresql://localhost:5432/tenant_db
spring.datasource.username=aguser
spring.datasource.password=agpassword
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=8081

app.jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7e4b52d7b4c0430a60bc3ee94b
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000
logging.level.org.springframework.security=DEBUG

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=tenant-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/gateway_analytics

# Email Configuration (using Gmail SMTP - we'll use a fake one for now)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.enabled=false


# Actuator - expose health endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.redis.enabled=false
management.health.mongo.enabled=false