
services:

  postgres:
    image: postgres:16
    container_name: ag_postgres
    environment:
      POSTGRES_DB: tenant_db
      POSTGRES_USER: aguser
      POSTGRES_PASSWORD: agpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: ag_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: aguser
      MONGO_INITDB_ROOT_PASSWORD: agpassword
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: ag_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  mongo_data: